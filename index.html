<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <!-- ضبط الاتجاه واللغة قبل رسم الصفحة لمنع وميض RTL/LTR عند تبديل اللغة -->
    <script>
      (function () {
        try {
          var l = localStorage.getItem('locale') || 'ar';
          var d = l === 'en' ? 'ltr' : 'rtl';
          document.documentElement.setAttribute('lang', l);
          document.documentElement.setAttribute('dir', d);
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>MarkaSphere | وكالة رقمية premium</title>
    <meta name="title" content="MarkaSphere | وكالة رقمية premium" />
    <meta name="description" content="MarkaSphere - وكالة رقمية متخصصة في تصميم وتطوير التجارب الرقمية المتميزة للعلامات التجارية. نبني المواقع والهويات البصرية والأنيميشن الاحترافي." />
    <meta name="keywords" content="digital agency, design, development, branding, web design, UI/UX, MarkaSphere, وكالة رقمية, تصميم, تطوير" />
    <meta name="author" content="MarkaSphere" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://markasphere.com/" />
    <meta property="og:title" content="MarkaSphere | وكالة رقمية premium" />
    <meta property="og:description" content="نبني الطريقة التي تظهر بها العلامات التجارية. وكالة رقمية متخصصة في تصميم وتطوير التجارب الرقمية المتميزة." />
    <meta property="og:image" content="https://markasphere.com/og-image.png" />
    <meta property="og:locale" content="ar_AR" />
    <meta property="og:site_name" content="MarkaSphere" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://markasphere.com/" />
    <meta property="twitter:title" content="MarkaSphere | وكالة رقمية premium" />
    <meta property="twitter:description" content="نبني الطريقة التي تظهر بها العلامات التجارية." />
    <meta property="twitter:image" content="https://markasphere.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#5b6cff" />

    <!-- Preconnect to Cloudinary CDN for image optimization -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
